app-id: com.ktechpit.formatfactory
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: formatfactory
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --env=INSTALL_TYPE=flatpak

modules:
  - shared-modules/squashfs-tools/squashfs-tools.json

  - name: formatfactory
    buildsystem: simple
    build-commands:
      - unsquashfs -no-progress *.snap
      - install -Dm755 squashfs-root/usr/bin/formatfactory ${FLATPAK_DEST}/bin/formatfactory
      - cp -r squashfs-root/usr/share/icons ${FLATPAK_DEST}/share/
      - install -Dm644 squashfs-root/usr/share/applications/com.ktechpit.formatfactory.desktop ${FLATPAK_DEST}/share/applications/com.ktechpit.formatfactory.desktop
      - desktop-file-edit --set-icon=${FLATPAK_ID} ${FLATPAK_DEST}/share/applications/com.ktechpit.formatfactory.desktop
      - install -Dm644 squashfs-root/usr/share/metainfo/com.ktechpit.formatfactory.appdata.xml ${FLATPAK_DEST}/share/metainfo/com.ktechpit.formatfactory.metainfo.xml
    sources:
      # =========================
      # x86_64 (amd64) — stable
      # =========================
      - type: file
        url: https://api.snapcraft.io/api/v1/snaps/download/VHkjlTHdKSgkkl65bX4FOUKxefYapalV_22.snap
        sha256: bfde56c0d71b1196fb82b2eccf457ea3ad1b49acf4c0ff9f9b4ce4aebe549977
        only-arches:
          - x86_64

      # =========================
      # arm64 (aarch64) — stable
      # =========================
      - type: file
        url: https://api.snapcraft.io/api/v1/snaps/download/VHkjlTHdKSgkkl65bX4FOUKxefYapalV_23.snap
        sha256: f504c549c5a39c7e482d7960d26539e5548e989da517477445584814ac186e6a
        only-arches:
          - aarch64
